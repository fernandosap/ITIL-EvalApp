.screen{max-width:680px;margin:0 auto;padding:24px 16px 48px}

/* Exam header */
.exam-header{background:#1F3864;color:white;padding:10px 20px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.header-info{display:flex;flex-direction:column}
.header-title{font-size:11px;opacity:.65;letter-spacing:.6px;text-transform:uppercase}
.header-code{font-size:15px;font-weight:800;letter-spacing:2px}

/* Timer */
.timer{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums;color:white;
  background:rgba(255,255,255,.12);padding:5px 14px;border-radius:6px;min-width:96px;text-align:center}
.timer.warning{background:#e67e22}
.timer.danger{background:#c0392b;animation:pulse 1s infinite}
.save-pill{font-size:11px;font-weight:700;letter-spacing:.3px;padding:4px 9px;border-radius:999px;
  border:1px solid rgba(255,255,255,.35);background:rgba(255,255,255,.14);color:#ecf2ff;min-width:110px;text-align:center}
.save-pill.saving{background:#2E75B6;color:#fff}
.save-pill.retry{background:#e67e22;color:#fff}
.save-pill.error{background:#c0392b;color:#fff}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}

/* Cards */
.card{background:white;border-radius:10px;padding:28px 32px;
  box-shadow:0 6px 32px rgba(0,0,0,.28),0 2px 8px rgba(0,0,0,.15);margin-bottom:20px}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;
  padding:11px 26px;border:none;border-radius:6px;font-size:15px;
  font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s}
.btn:hover:not(:disabled){opacity:.88;transform:translateY(-1px)}
.btn:active:not(:disabled){transform:translateY(0)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:#1F3864;color:white}
.btn-danger{background:#c0392b;color:white}
.btn-secondary{background:#eef1f7;color:#1F3864;border:1.5px solid #c0c8d8}
.btn-success{background:#1a5c1a;color:white}
.btn-full{width:100%;margin-bottom:10px}
.btn-sm{padding:6px 14px;font-size:13px}

/* Progress & nav dots */
.progress-bar{height:5px;background:#e0e6f0;border-radius:3px;margin-bottom:8px}
.progress-fill{height:100%;background:#2E75B6;border-radius:3px;transition:width .3s}
.nav-dots{display:flex;gap:3px;flex-wrap:wrap;justify-content:center;max-width:540px;margin:0 auto}
.nav-dot{width:10px;height:10px;border-radius:50%;background:#ddd;cursor:pointer;transition:transform .1s}
.nav-dot:hover{transform:scale(1.4)}
.nav-dot.answered{background:#2E75B6}
.nav-dot.skipped{background:#f0c040}
.nav-dot.current{background:#1F3864;transform:scale(1.3)}

/* Question */
.q-meta{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.q-num{font-size:13px;color:#777;font-weight:700}
.multi-badge{background:#fff2cc;color:#c55a11;font-size:11px;font-weight:700;
  padding:2px 8px;border-radius:4px;border:1px solid #f0c040}
.q-stem{font-size:16px;font-weight:700;line-height:1.65;color:#1a1a2e;margin-bottom:8px}
.multi-note{font-size:13px;color:#c55a11;font-style:italic;margin-bottom:14px;
  background:#fff9ec;padding:7px 10px;border-radius:4px;border-left:3px solid #f0c040}

/* Options */
.options{display:flex;flex-direction:column;gap:9px;margin-top:14px}
.option{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;
  border:2px solid #e0e6f0;border-radius:8px;cursor:pointer;
  transition:all .15s;background:white;text-align:left;width:100%;font-size:14px;line-height:1.5}
.option:hover{border-color:#2E75B6;background:#f5f8ff}
.option.selected{border-color:#1F3864;background:#eef3fa}
.option.selected .opt-letter{background:#1F3864;color:white}
.opt-letter{width:27px;height:27px;border-radius:50%;background:#eef1f7;color:#1F3864;
  font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px}
.opt-text{flex:1}

/* Exam nav bar */
.exam-nav{display:flex;justify-content:space-between;align-items:center;
  margin-top:18px;gap:10px;flex-wrap:wrap}
.sel-count{font-size:13px;color:#888;flex:1;text-align:center}

/* Webcam corner */
.webcam-corner{position:fixed;bottom:16px;right:16px;z-index:200;
  border-radius:8px;overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.4);
  border:2px solid #1F3864;background:#000}
.webcam-corner video{display:block;width:150px;height:112px;object-fit:cover;transform:scaleX(-1)}
.webcam-label{background:#c0392b;color:white;font-size:10px;
  text-align:center;padding:3px;font-weight:700;letter-spacing:.5px}

/* Results */
.score-circle{width:130px;height:130px;border-radius:50%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;margin:0 auto 16px;border:6px solid}
.score-circle.pass{border-color:#1a5c1a;background:#f0fff0;color:#1a5c1a}
.score-circle.fail{border-color:#c0392b;background:#fff5f5;color:#c0392b}
.score-num{font-size:34px;font-weight:800;line-height:1}
.score-den{font-size:13px;color:#666;font-weight:600}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.6);z-index:500;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:white;border-radius:12px;padding:28px 32px;max-width:420px;
  width:92%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.25)}
.modal-icon{font-size:38px;margin-bottom:10px}
.modal-title{font-size:19px;font-weight:700;margin-bottom:8px;color:#1F3864}
.modal-body{font-size:13px;color:#555;line-height:1.7;margin-bottom:20px;
  white-space:pre-wrap;text-align:left;max-height:320px;overflow-y:auto}
.modal-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* Code entry */
.code-input{font-size:32px;font-weight:800;letter-spacing:8px;text-align:center;
  text-transform:uppercase;border:3px solid #2E75B6;border-radius:10px;
  padding:14px 20px;width:100%;font-family:monospace;color:#1F3864}
.code-input:focus{outline:none;border-color:#1F3864;box-shadow:0 0 0 3px rgba(31,56,100,.15)}

/* Admin */
.admin-wrap{max-width:1100px;margin:0 auto;padding:20px 16px}
.admin-table{width:100%;border-collapse:collapse;font-size:13px}
.admin-table th{background:#1F3864;color:white;padding:9px 12px;text-align:left;font-weight:600;white-space:nowrap}
.admin-table td{padding:8px 12px;border-bottom:1px solid #e8ecf2;vertical-align:middle}
.admin-table tr:nth-child(even) td{background:#f7f9fc}
.chip{padding:2px 9px;border-radius:4px;font-weight:700;font-size:11px}
.chip-pass{background:#c6efce;color:#1a5c1a}
.chip-fail{background:#ffc7ce;color:#c0392b}
.chip-active{background:#fff2cc;color:#c55a11}
.chip-unused{background:#f0f0f0;color:#888}
.chip-flag{background:#ffd7b3;color:#c55a11;cursor:pointer}

/* Misc */
h2{font-size:21px;font-weight:700;color:#1F3864;margin-bottom:8px}
p{line-height:1.6;color:#444}
.label{font-weight:700;color:#1F3864;font-size:13px;margin-bottom:4px;display:block}
input[type="text"],input[type="password"],input[type="number"]{
  width:100%;padding:10px 13px;border:2px solid #dde3ef;border-radius:6px;
  font-size:14px;margin-bottom:14px;transition:border-color .15s}
input:focus{outline:none;border-color:#2E75B6}
.divider{height:1px;background:#e8ecf2;margin:18px 0}
.glass-card{background:rgba(255,255,255,0.94);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-radius:12px;padding:28px 32px;box-shadow:0 8px 40px rgba(0,0,0,.35),0 2px 8px rgba(0,0,0,.2);}
.consent-box{background:#f7f9fc;border:1.5px solid #d0d8e8;border-radius:8px;
  padding:14px 16px;margin:14px 0;font-size:13px;line-height:1.7;color:#444}
.consent-box ul{margin:6px 0 0 18px}
.consent-box li{margin-bottom:4px}
.checkbox-row{display:flex;align-items:center;gap:10px;margin-top:14px;cursor:pointer}
.checkbox-row input{width:17px;height:17px;cursor:pointer;flex-shrink:0}
.checkbox-row label{font-size:13px;font-weight:600;cursor:pointer}
.check-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #eee}
.check-icon{font-size:20px;width:28px;text-align:center;flex-shrink:0}
.check-info{flex:1}
.check-info strong{font-size:14px}
.check-info span{font-size:12px;color:#777;display:block;margin-top:2px}
.status-ok{color:#1a5c1a;font-weight:700;font-size:13px}
.status-pend{color:#c55a11;font-weight:600;font-size:13px}
.status-err{color:#c0392b;font-weight:700;font-size:13px}
.webcam-preview{margin:14px 0;text-align:center;display:none}
.webcam-preview video{width:180px;height:135px;border-radius:8px;border:2px solid #2E75B6;object-fit:cover;transform:scaleX(-1)}
.no-select{-webkit-user-select:none;user-select:none}
</style>
</head>

// ── SEEDED PRNG (consistent per access code) ─────────────────────────────────
function makePRNG(seed) {
  let s = 0;
  for (let i = 0; i < seed.length; i++) s = (Math.imul(s, 31) + seed.charCodeAt(i)) >>> 0;
  return function() {
    s = (Math.imul(s, 1664525) + 1013904223) >>> 0;
    return s / 4294967296;
  };
}
function seededShuffle(arr, rng) {
  const r = [...arr];
  for (let i = r.length - 1; i > 0; i--) {
    const j = 0 | (rng() * (i + 1));
    [r[i], r[j]] = [r[j], r[i]];
  }
  return r;
}

const API_TIMEOUT_MS = 8000;
const API_BASE_RETRY_MS = 400;
let _pendingSaves = 0;
const SAVE_UI = { cls: '', text: 'Synced' };

function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

function setSavePill(cls, text) {
  SAVE_UI.cls = cls || '';
  SAVE_UI.text = text || 'Synced';
  const el = $('save-pill');
  if (!el) return;

  el.textContent = SAVE_UI.text;
}

function markSaveStart() {
  _pendingSaves++;
  setSavePill('saving', 'Saving...');
}

function markRetry(attempt) {
  setSavePill('retry', `Retrying (${attempt})...`);
}

function markSaveDone(ok) {
  _pendingSaves = Math.max(0, _pendingSaves - 1);
  if (_pendingSaves > 0) return;
  if (ok) setSavePill('', 'Saved');
  else setSavePill('error', 'Sync issue');
}

function errorMessage(err, fallback) {
  if (!err) return fallback;
  if (err.name === 'AbortError') return 'Request timed out';
  if (err.message) return err.message;
  return fallback;
}

async function apiFetch(url, opts = {}, cfg = {}) {
  const method = String((opts.method || 'GET')).toUpperCase();
  const retries = Number.isInteger(cfg.retries) ? cfg.retries : (method === 'GET' ? 1 : 2);
  const timeoutMs = cfg.timeoutMs || API_TIMEOUT_MS;
  const isSave = !!cfg.isSave;

  if (isSave) markSaveStart();
  let lastErr = null;

  for (let attempt = 0; attempt <= retries; attempt++) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    try {
      const resp = await fetch(url, { ...opts, signal: controller.signal });
      clearTimeout(timer);
      if (!resp.ok) {
        const e = new Error(`HTTP ${resp.status}`);
        e.status = resp.status;
        throw e;
      }
      if (isSave) markSaveDone(true);
      return resp;
    } catch (err) {
      clearTimeout(timer);
      lastErr = err;
      const status = err && err.status ? err.status : 0;
      const retryable = err.name === 'AbortError' || status === 0 || status === 429 || status >= 500;
      if (attempt < retries && retryable) {
        if (isSave) markRetry(attempt + 1);
        await sleep(API_BASE_RETRY_MS * Math.pow(2, attempt));
        continue;
      }
      if (isSave) markSaveDone(false);
      throw new Error(errorMessage(err, 'API request failed'));
    }
  }

  if (isSave) markSaveDone(false);
  throw new Error(errorMessage(lastErr, 'API request failed'));
}

async function apiJson(url, opts = {}, cfg = {}) {
  const r = await apiFetch(url, opts, cfg);
  const ct = (r.headers.get('content-type') || '').toLowerCase();
  if (!ct.includes('application/json')) return null;
  return r.json();
}

}

  S.qOrder = seededShuffle(QS.map((_,i)=>i), rng);
  S.optOrders = S.qOrder.map(oi => seededShuffle(QS[oi].opts.map((_,i)=>i), rng));
  S.answers = Array(30).fill(null).map(() => []);

  renderQ();

function renderQ() {
  S.screen = 'exam';
  document.body.classList.add('exam-bg');
  S.visited.add(S.currentQ);
  const di = S.currentQ;
  const q = QS[S.qOrder[di]];
  const ord = S.optOrders[di];
  const sel = S.answers[di] || [];
  const answered = S.answers.filter(a => a && a.length > 0).length;
  const pct = (answered / 30) * 100;
  const isLast = di === 29;
  const unanswered = unansweredCount();

  const opts = ord.map((oi, dp) => {
    const L = 'ABCDEF'[dp];
    const isSel = sel.includes(oi);
    return `<button class="option${isSel?' selected':''}" onclick="pick(${oi})">
      <span class="opt-letter">${L}</span>
      <span class="opt-text">${q.opts[oi]}</span>
    </button>`;
  }).join('');

  const dots = Array.from({length:30}, (_,i) => {
    const a = S.answers[i] || [];
    const vis = S.visited.has(i);
    let cls = 'nav-dot';
    if (i === di) cls += ' current';

function goToQ(i) { if(!S.submitted){S.currentQ=i;renderQ();} }
function prevQ() { if(S.currentQ>0&&!S.submitted){S.currentQ--;renderQ();} }
function nextQ() { if(!S.submitted){S.currentQ=Math.min(29,S.currentQ+1);renderQ();} }

function pick(oi) {
  if (S.submitted) return;
  const q = QS[S.qOrder[S.currentQ]];
  let a = [...(S.answers[S.currentQ]||[])];
  if (q.multi) { a = a.includes(oi) ? a.filter(x=>x!==oi) : [...a,oi]; }
  else { a = [oi]; }
  S.answers[S.currentQ] = a;
  renderQ();
}

function trySubmit() {
  if (S.submitted) return;
  const u = unansweredCount();
  if (u > 0) {
    modal('⚠️','Unanswered Questions',
      `${u} question${u!==1?'s are':' is'} still unanswered.\n\nUse the navigation dots to go back and answer all questions before submitting.`,
      [{label:'Go Back', cls:'btn-primary'}]);
    return;
  }
  modal('📝','Submit Exam',
    'Are you sure you want to submit?\n\nYou will not be able to make any changes after submission.',
    [
      {label:'Submit Now', cls:'btn-primary', action:()=>submitExam(false)},
      {label:'Cancel', cls:'btn-secondary'},
    ]);
}

// ── TIMER ─────────────────────────────────────────────────────────────────────
function startTimer() {
  S.timerInterval = setInterval(updateTimer, 500);
}
function getRemainingMs() {
  const usedMs = S.elapsed + (S.startTime ? Date.now() - S.startTime : 0);
  return CFG.durationSecs * 1000 - usedMs;
}
function updateTimer() {
  const rem = Math.ceil(getRemainingMs() / 1000);
  const el = $('timer'); if (!el) return;
  if (rem <= 0) { el.textContent='00:00'; clearInterval(S.timerInterval); if(!S.submitted) submitExam(true); return; }
  el.textContent = fmt(rem);
  el.className = 'timer' + (rem<=60?' danger':rem<=300?' warning':'');
}

// ── SECURITY & PROCTORING ─────────────────────────────────────────────────────
let _blurTime = null;
function setupSecurity() {
  if (S.securityBound) return;
  document.addEventListener('visibilitychange', onVisChange);
  window.addEventListener('blur', onBlur);
  window.addEventListener('focus', onFocus);
  S.securityBound = true;
}
function onBlur() {
  if(S.screen!=='exam'||S.submitted) return;
  _blurTime = Date.now();
  log('focus_lost','Window lost focus');
}
function onFocus() {
  if(S.screen!=='exam'||S.submitted||!_blurTime) return;
  const awayMs = Date.now() - _blurTime;
  const secs = Math.round(awayMs/1000);
  _blurTime = null;
  // Very short focus losses can indicate screenshot/snipping shortcuts on some OS/browser combos.
  if (awayMs > 0 && awayMs < 450) {
    log('possible_screenshot', `Brief focus loss: ${awayMs}ms`);
  }
  if(secs>=2){
    log('focus_returned',`Away ${secs}s`);
    modal('⚠️','Browser Window Lost Focus',
      `Your exam window was inactive for ${secs} second${secs!==1?'s':''}.\n\nPlease keep this window open and in the foreground at all times. All focus loss events are logged and reviewed by your proctor.\n\nRepeat occurrences may be escalated.`,
      [{label:'Return to Exam', cls:'btn-primary'}]);
  }
}
function onVisChange() {
  if(!document.hidden||S.screen!=='exam'||S.submitted) return;
  S.tabSwitches++;
  log('tab_switch',`Tab switch #${S.tabSwitches}`);
  setTimeout(()=>{
    if(!document.hidden){
      const serious = S.tabSwitches >= 3;
      modal('🚨','Tab Switch Detected',
        `Tab or window switch #${S.tabSwitches} has been detected and logged.\n\n${serious
          ? '⚠️ You have left the exam window multiple times. Your proctor has been notified. This may affect the validity of your result.'
          : 'Do not navigate away from this exam window. All activity is monitored and logged.'}\n\nReturn immediately and do not leave this window again.`,
        [{label:'Return to Exam', cls: serious?'btn-danger':'btn-primary'}]);
    }
  }, 350);
}

function startProctor() {
  if (!proctorEnabled()) return;
  S.webcamInterval = setInterval(proctor, CFG.webcamIntervalS * 1000);
}
async function proctor() {
  if(S.submitted||S.screen!=='exam') return;
  try{
    const v=$('hidden-cam');
    if(!v||!v.videoWidth) return;
    const c=$('cap-canvas');
    c.width=Math.min(v.videoWidth,320); c.height=Math.min(v.videoHeight,240);
    c.getContext('2d').drawImage(v,0,0,c.width,c.height);
    const b64=c.toDataURL('image/jpeg',0.65).split(',')[1];
    const resp=await apiFetch('/api/proctor/check',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({imageB64:b64})
    },{timeoutMs:15000,retries:0});
    if(!resp.ok) return;
    const d=await resp.json();
    if(d.enabled===false) return;
    if(d.flag){
      log('ai_flag', d.reason||'AI proctoring flag');
      modal('🚨','Proctoring Alert',
        `An automated proctoring check has flagged the following concern:\n\n"${d.reason||'Suspicious behaviour detected'}"\n\nThis event has been logged against your access code and will be reviewed by your proctor.\n\nPlease ensure only you are visible on camera and no unauthorised materials are present.`,
        [{label:'I understand', cls:'btn-danger'}]);
    }
  }catch(e){}
}

document.addEventListener('contextmenu',e=>{if(S.screen==='exam'){e.preventDefault();log('right_click','Right-click');}});
document.addEventListener('selectstart',e=>{if(S.screen==='exam')e.preventDefault();});
document.addEventListener('keydown',e=>{
  if(S.screen!=='exam') return;
  if(e.key==='F12'||(e.ctrlKey&&'uUiIjJsS'.includes(e.key))){
    e.preventDefault(); log('shortcut',`Ctrl+${e.key}`);
    return;
  }

  const isWinPrintScreen = e.key==='PrintScreen' && !e.metaKey;
  const isAltPrintScreen = e.key==='PrintScreen' && e.altKey;
  const isCtrlP = e.ctrlKey && (e.key==='p'||e.key==='P');
  const isCtrlShiftS = e.ctrlKey && e.shiftKey && (e.key==='s'||e.key==='S');
  const isSnippingTool = e.metaKey && e.shiftKey && (e.key==='s'||e.key==='S');
  if(isWinPrintScreen||isAltPrintScreen||isCtrlP||isCtrlShiftS||isSnippingTool){
    e.preventDefault();
    const label = isWinPrintScreen ? 'PrintScreen'
                : isAltPrintScreen ? 'Alt+PrintScreen'
                : isCtrlP          ? 'Ctrl+P (print/screenshot)'
                : isCtrlShiftS     ? 'Ctrl+Shift+S'
                : 'Win+Shift+S (Snipping Tool)';
    log('screenshot_attempt', label);
    modal('🚨','Screenshot Detected',
      `A screenshot attempt (${label}) has been detected and logged against your access code.\n\nScreenshots of this exam are strictly prohibited. This incident will be reviewed by your proctor and may affect the validity of your result.\n\nPlease do not attempt to capture exam content.`,
      [{label:'I understand', cls:'btn-danger'}]);
  }
});

// ── GRADING ───────────────────────────────────────────────────────────────────
function grade() {
  const answerKey = _decryptAnswers();
  let score = 0;
  S.qOrder.forEach((oi,di) => {
    const correct = (answerKey[oi]||[]).slice().sort().join(',');
    const given   = (S.answers[di]||[]).slice().sort().join(',');
    if(correct===given) score++;
  });
  const pct = Math.round(score/CFG.totalQ*100);
  return { score, total:CFG.totalQ, pass:score>=CFG.passScore, pct };
}

// ── SUBMIT ────────────────────────────────────────────────────────────────────
async function submitExam(auto=false) {
  if(S.submitted) return;
  S.submitted = true;
  clearInterval(S.timerInterval); clearInterval(S.webcamInterval);
  document.removeEventListener('visibilitychange',onVisChange);
  window.removeEventListener('blur',onBlur);
  window.removeEventListener('focus',onFocus);
  S.securityBound = false;
  if(S.webcamStream) S.webcamStream.getTracks().forEach(t=>t.stop());
  if(S.screenStream) S.screenStream.getTracks().forEach(t=>t.stop());

  const r = grade();
  const durationSecs = Math.round((S.elapsed + (Date.now()-S.startTime))/1000);
  const rec = {
    code:S.code, score:r.score, total:r.total, pass:r.pass, pct:r.pct,
    autoSubmit:auto, tabSwitches:S.tabSwitches,
    incidents:S.incidents, incidentCount:S.incidents.length,
    durationSecs, submittedAt:new Date().toISOString(),
  };

  // Save result locally and clear session
  resultSet(S.code, rec);
  sessionDelete(S.code);

  // Update codebook
  const cb = codebookGet();
  if(cb[S.code]){
    cb[S.code].status='completed';
    cb[S.code].score=r.score; cb[S.code].pass=r.pass; cb[S.code].pct=r.pct;
    codebookSet(cb);
  }

  showResultsFromRecord(rec);
}

  if (lbl) { lbl.textContent = val ? 'Enabled' : 'Disabled'; lbl.style.color = val ? '#1a5c1a' : '#c0392b'; }
  modal(val ? '✅' : '⚠️',
    val ? 'Proctor Tools Enabled' : 'Proctor Tools Disabled',
    val
      ? 'Webcam monitoring and screen sharing are now required for all new exam sessions.'
      : 'Webcam and screen sharing are no longer required. Tab/focus warnings remain active.',
    [{label:'OK', cls:'btn-primary'}]);
}

function generateCodes() {
  const n = parseInt(($('gen-count')||{}).value||'10', 10);
  if(!n||n<1||n>200){ modal('⚠️','Invalid Count','Enter a number between 1 and 200.',[{label:'OK',cls:'btn-primary'}]); return; }
  const cb = codebookGet();
  let added = 0;
  for(let i=0; i<n; i++){
    let code, tries=0;
    do { code=genCode(); tries++; } while(cb[code]&&tries<100);
    if(!cb[code]){
      cb[code]={ label:`Seat ${Object.keys(cb).length+1}`, status:'unused', createdAt:new Date().toISOString() };
      added++;
    }
  }
  codebookSet(cb);
  showAdmin();
  modal('✅','Codes Generated',`${added} new access code${added!==1?'s were':' was'} generated.\n\nClick "⬇ Code List" to download the code→seat mapping to distribute to candidates.`,
    [{label:'OK', cls:'btn-primary'}]);
}

function dlCodeMapping() {
  const cb = codebookGet();
  const lines = ['Access Code,Label,Status']
    .concat(Object.entries(cb).map(([code,v])=>`${code},"${v.label||''}",${v.status}`));
  const blob = new Blob([lines.join('\n')],{type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='ITIL4_Access_Codes.csv'; a.click();
  URL.revokeObjectURL(url);
}

function saveNote(code, val) {
  const cb = codebookGet();
  if (!cb[code]) return;
  cb[code].notes = (val || '').trim();
  codebookSet(cb);
}

function confirmReset(code) {
  const cb = codebookGet();
  const v = cb[code]||{};
  modal('⚠️','Reset Access Code',
    `Are you sure you want to reset code ${code} (${v.label||'unlabelled'})?\n\nThis will:\n• Clear all saved exam progress\n• Delete any stored result\n• Reset the code to Unused\n\nThis action cannot be undone.`,
    [
      { label:'Reset Code', cls:'btn-danger', action:()=>doReset(code) },
      { label:'Cancel', cls:'btn-secondary' },
    ]);
}

function doReset(code) {
  const cb = codebookGet();
  if(cb[code]) { cb[code].status='unused'; delete cb[code].score; delete cb[code].pass; delete cb[code].pct; codebookSet(cb); }
  sessionDelete(code);
  resultDelete(code);
  showAdmin();
  modal('✅','Code Reset',`Code ${code} has been reset to Unused.\n\nThe candidate can now re-enter using the same code.`,
    [{label:'OK', cls:'btn-primary'}]);
}

function showIncidents(code) {
  const res = resultGet(code);
  if(!res||!res.incidents||!res.incidents.length){
    modal('ℹ️','No Incidents',`No incidents logged for code ${code}.`,[{label:'OK',cls:'btn-primary'}]); return;
  }
  const txt = res.incidents.map(x=>`${x.time}  [${x.type}]\n${x.detail}`).join('\n─────────────\n');
  modal('⚠️',`Incidents — ${code}`,txt,[{label:'Close',cls:'btn-primary'}]);
}

async function dlCSV() {
  try {
    const r = await apiFetch('/api/admin/export.csv', {}, { timeoutMs: 12000, retries: 1 });
    const txt = await r.text();
    const b = new Blob([txt], { type: 'text/csv' });
    const u = URL.createObjectURL(b);
    const a = document.createElement('a');
    a.href = u; a.download = 'ITIL4_Exam_Results.csv'; a.click();
    URL.revokeObjectURL(u);
  } catch (e) {
    if (!window._adminCsv) {
      modal('❌', 'Export Failed', 'Could not export CSV from server. Please try again.', [{label:'OK', cls:'btn-primary'}]);
      return;
    }
    const b = new Blob([window._adminCsv], { type: 'text/csv' });
    const u = URL.createObjectURL(b);
    const a = document.createElement('a');
    a.href = u; a.download = 'ITIL4_Exam_Results.csv'; a.click();
    URL.revokeObjectURL(u);
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function initApp() {
  await bootstrapStorage();
  setSavePill('', 'Synced');
  ensureCodebook();
  new URLSearchParams(window.location.search).get('admin')==='1'
    ? showAdminLogin()
    : showCodeEntry();
}
initApp();
</script>
</body>
</html>
